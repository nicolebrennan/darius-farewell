* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px; }
.stage { width: 100%; max-width: 820px; font-family: 'Courier New', monospace; background: #07080f; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #2a2a3a; }

.marquee-bar { background: #0d0d1a; border-bottom: 2px solid #1a1a2e; padding: 6px 0; overflow: hidden; }
.marquee-text { display: inline-block; white-space: nowrap; color: #ff66cc; font-size: 17px; letter-spacing: 2px; animation: scroll-left 24s linear infinite; }
@keyframes scroll-left { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.main-area { display: flex; height: 480px; }
.singer-col { flex: 0 0 290px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; overflow: hidden; }
.bubbles-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid #1a1a2e; }
.bubbles-header { padding: 10px 14px 6px; border-bottom: 1px solid #1a1a2e; color: #fbbf24; font-size: 11px; letter-spacing: 2px; flex-shrink: 0; }
.bubbles-ticker { height: 440px; overflow: hidden; position: relative; padding: 0 14px; flex-shrink: 0; }
.bubbles-ticker::before { content:''; position:absolute; top:0; left:0; right:0; height:30px; background:linear-gradient(to bottom,#07080f,transparent); z-index:2; pointer-events:none; }
.bubbles-ticker::after  { content:''; position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(to top,#07080f,transparent); z-index:2; pointer-events:none; }
.ticker-track { display:flex; flex-direction:column; gap:10px; padding:10px 0; animation:ticker-up 144s linear infinite; }
@keyframes ticker-up { 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }
.bubble-card { background:#111827; border:1.5px solid #334155; border-radius:10px; padding:10px 12px; flex-shrink:0; }
.bubble-name { font-size:11px; color:#ff66cc; letter-spacing:1px; margin-bottom:3px; }
.bubble-text { font-size:13px; color:#e2e8f0; line-height:1.45; word-break:break-word; }
.figure-sway { animation: sway 3s ease-in-out infinite; transform-origin: 118px 358px; }
@keyframes sway { 0%,100%{transform:rotate(-1.5deg)} 50%{transform:rotate(1.5deg)} }
.note1 { animation: float1 1.5s ease-in-out infinite; }
.note2 { animation: float2 1.9s ease-in-out 0.45s infinite; }
.note3 { animation: float3 1.7s ease-in-out 0.9s infinite; }
@keyframes float1 { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-46px) translateX(10px);opacity:0} }
@keyframes float2 { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-56px) translateX(-8px);opacity:0} }
@keyframes float3 { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-40px) translateX(15px);opacity:0} }
.spotlight { animation: spot-pulse 2.6s ease-in-out infinite alternate; }
@keyframes spot-pulse { from{opacity:0.3} to{opacity:0.65} }
.disco-flash { animation: dflash 1.1s ease-in-out infinite; }
@keyframes dflash { 0%,100%{opacity:0.08} 50%{opacity:0.5} }
.screen-glow { animation: sglow 2s ease-in-out infinite alternate; }
@keyframes sglow { from{opacity:0.6} to{opacity:1} }
.lyric-scroll { animation: lscroll 7s linear infinite; }
@keyframes lscroll { 0%{transform:translateY(0)} 100%{transform:translateY(-44px)} }

  { name: "Kalie",    msg: "DARIUS! Thank you for being the best on and offline. I am so grateful to have had the opportunity to work with you and look forward to hearing more about how you are fixing the internet and saving the world. I hope to see you in Portland sometime and don't be a stranger if you're in Cambridge!" },

  { name: "Yajaira",  msg: "It was nice meeting you, even if only briefly. Wishing you the best in your next chapter!" },
  { name: "Teagan",   msg: "I love the energy you bring to everything, whether it's your own project, a collaboration, or just having fun. Thank you for all of the guidance over the past year, I'm sure your next project will be a success!" },
  { name: "Toni",     msg: "Darius! What an absolute pleasure getting to know you and work alongside you these past years. Will always remember our DC trip fondly! Wishing you all the best and please don't be a stranger!" },

  { name: "Kathy",    msg: "Thank you for all your collaboration and support these past 2 years at ASML! It's been such a pleasure to work with you and learn from you about engineering and life. Your fun facts are unparalleled and opened my eyes to the heights of fun that facts can achieve. I also appreciate how you always increase the level of sincerity and fun of an event when you're in the room. I will need to learn your Spaghetti Napolitan recipe in your honour!" },
  { name: "Lara",     msg: "Darius!! It's been such a joy to be your coworker for the last couple of years. You are so thoughtful and creative and just happen to have written an essay on every question that crosses my mind, and I'm very grateful to have met you. Can't wait to see all the wacky, industry-shifting work you get up to in your \"time off.\" Keep in touch!!" },

  { name: "Sarah",    msg: "Darius! We haven't been able to work together as much as I would have liked, but it was always great seeing you at our work weeks in-person! I wish you the best in everything that you pursue, in both your personal and professional endeavors." },
  { name: "Jen",      msg: "Darius, though we didn't get to work together much, I always enjoyed your contributions in meetings. You are often the one saying what the rest of us are thinking, and that is so very valuable. Your unique blend of passion, humor, mentorship, and advocacy will be sorely missed. I wish you all the best and hope to stay in touch!" },
  { name: "Mickens",  msg: "I'm so glad that our paths crossed at the random conference in DC and that you were able to come to ASML! It was great to see you do so well in your own projects while contributing so much to a positive and fun environment in the lab overall. I hope—nay, I fully expect and demand—that our paths shall cross again :-D." },
  { name: "Cruz",     msg: "You will be missed! Please let me know when you are in Boston for some A4Cade and Sega Dreamcast." },
  { name: "Nora",     msg: "Darius! It's always a pleasure to pick your brain, and your voice of reason is appreciated in every meeting. I hope we get the chance to properly work together on a project someday, but until then, enjoy a well-deserved vacation in standards land." },

  { name: "Alice",    msg: "Darius, thank you for being a wonderful teammate and working your magic on so many incredible projects! I'm grateful to have worked with you at ASML this past year, and I look forward to following your work and art in the fediverse and beyond." },

function buildTicker() {
  const track = document.getElementById('ticker-track');
  [...SEED, ...SEED].forEach(function(b) {
    const div = document.createElement('div');
    div.className = 'bubble-card';
    div.innerHTML = '<div class="bubble-name">[ ' + b.name.toUpperCase() + ' ]</div><div class="bubble-text">' + b.msg + '</div>';
    track.appendChild(div);
  });
  track.style.animationDuration = (SEED.length * 6) + 's';
}

buildTicker();
